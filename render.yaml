services:
  # Backend Web Service
  - type: web
    name: pixelate-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd pixelate-store-rd/backend && npm install
    startCommand: cd pixelate-store-rd/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d

  # Frontend Static Site
  - type: static_site
    name: pixelate-frontend
    buildCommand: cd pixelate-store-rd/frontend && npm install && npm run build
    staticPublishPath: pixelate-store-rd/frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://pixelate-backend.onrender.com/api
